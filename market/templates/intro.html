<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBORN | 가치의 선순환</title>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/reborn_logo.png') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        /* 폰트 설정 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #ffffff;
            overflow: hidden;
            /* 브라우저 텍스트 렌더링 엔진 고정 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* 등장 애니메이션 */
        .hero-section > * {
            opacity: 0;
            transform: translate3d(0, 30px, 0);
            animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            will-change: transform, opacity;
        }

        .logo-wrapper { animation-delay: 0.2s; }
        .main-title { animation-delay: 0.4s; }
        .sub-title { animation-delay: 0.6s; }
        .cta-group { animation-delay: 0.8s; }
        .login-link { animation-delay: 1.0s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        /* 로고 애니메이션 */
        .logo-img {
            height: 100px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -15px, 0); }
        }

        .main-title {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 900;
            color: #333;
            letter-spacing: -3px;
            margin-bottom: 10px;
        }

        .main-title span { color: #9C96F3; }

        .sub-title {
            font-size: 1.25rem;
            color: #777;
            font-weight: 300;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        /* 버튼 그룹 스타일 */
        .cta-group {
            display: flex;
            gap: 20px;
        }

        /* 버튼 공통 스타일 */
        .btn-reborn {
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            transform: translate3d(0, 0, 0);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                        background-color 0.2s ease,
                        color 0.2s ease,
                        border-color 0.2s ease,
                        box-shadow 0.3s ease;
        }

        /* 지금 둘러보기 버튼 */
        .btn-fill {
            background-color: #9C96F3;
            color: #ffffff;
            border: 2px solid #9C96F3;
            box-shadow: 0 8px 20px rgba(204, 204, 255, 0.2);
        }

        .btn-fill:hover {
            background-color: #8479ED;
            border-color: #8479ED;
            transform: translate3d(0, -6px, 0);
            box-shadow: 0 12px 25px rgba(204, 204, 255, 0.4);
            color: #ffffff;
        }

        /* 회원가입 버튼 */
        .btn-outline {
            background-color: #ffffff;
            color: #9C96F3;
            border: 2px solid #9C96F3;
        }

        .btn-outline:hover {
            background-color: #fcfcff;
            color: #8479ED;
            border-color: #8479ED;
            transform: translate3d(0, -6px, 0);
        }

        /* 하단 로그인 링크 */
        .login-link {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            color: #aaa;
            text-decoration: none;
            transition: color 0.3s, transform 0.3s;
        }

        .login-link:hover {
            color: #9C96F3;
            transform: translate3d(0, -2px, 0);
        }

        /* 모바일 */
        @media (max-width: 576px) {
            .cta-group { flex-direction: column; width: 85%; }
            .btn-reborn { width: 100%; padding: 15px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="logo-wrapper">
            <img src="{{ url_for('static', filename='img/reborn_logo.png') }}" alt="REBORN" class="logo-img">
        </div>

        <h1 class="main-title">RE<span>BORN</span></h1>
        <p class="sub-title">다시 태어나는 물건의 가치, 선순환의 시작</p>

        <div class="cta-group">
            <a href="{{ url_for('main.index') }}" class="btn-reborn btn-fill">
                지금 둘러보기
            </a>
            <a href="{{ url_for('auth.signup') }}" class="btn-reborn btn-outline">
                회원가입
            </a>
        </div>

        <a href="{{ url_for('auth.login') }}" class="login-link">
            이미 계정이 있나요? <strong>로그인하기</strong>
        </a>
    </section>

</body>
</html>
